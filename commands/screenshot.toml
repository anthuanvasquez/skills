# In: ~/.gemini/commands/screenshot.toml
#
# Invoked via: /screenshot
#
# Usage: /screenshot [prompt]
# Ex: /screenshot What do you see in this image?

description = "Analyzes the latest screenshot saved in ~/Documents/Screenshots"

prompt = """
Analyze the following image and respond to the user's question or request:

Image:
@{$(ls -t ~/Documents/Screenshots/*.png 2>/dev/null | head -1)}

{{args}}
"""
